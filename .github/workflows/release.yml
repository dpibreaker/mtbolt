name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev zlib1g-dev libjemalloc-dev libmaxminddb-dev

      - name: Build
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          make -j$(nproc) EXTRA_VERSION="${VERSION}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mtbolt-linux-amd64
          path: objs/bin/teleproxy

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/mtbolt-linux-amd64/teleproxy release/mtbolt-linux-amd64
          chmod +x release/mtbolt-linux-amd64
          cd release
          sha256sum mtbolt-linux-amd64 > SHA256SUMS

      - name: Extract changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md > release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          body_path: release-notes.md
