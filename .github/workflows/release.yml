name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: amd64
            runs-on: ubuntu-latest
          - arch: arm64
            runs-on: ubuntu-24.04-arm

    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev libjemalloc-dev libmaxminddb-dev

      - name: Build
        run: make

      - name: Rename binary
        run: cp objs/bin/mtbolt mtbolt-linux-${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mtbolt-linux-${{ matrix.arch }}
          path: mtbolt-linux-${{ matrix.arch }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mtbolt-linux-amd64/mtbolt-linux-amd64
            mtbolt-linux-arm64/mtbolt-linux-arm64
          generate_release_notes: true
