name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev zlib1g-dev libjemalloc-dev libmaxminddb-dev

      - name: Build
        run: make -j$(nproc)

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: mtbolt-linux-amd64
          path: objs/bin/teleproxy
