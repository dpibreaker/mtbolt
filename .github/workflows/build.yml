name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev libjemalloc-dev libmaxminddb-dev

      - name: Build
        run: make

      - name: Verify binary
        run: |
          ls -la objs/bin/mtbolt
          file objs/bin/mtbolt
