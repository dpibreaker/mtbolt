services:
  socks5:
    build:
      context: .
      dockerfile: Dockerfile.socks5
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.create_connection(('localhost',1080)); s.close()\""]
      interval: 2s
      timeout: 3s
      retries: 10

  teleproxy:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        DEBUG_TOOLS: "1"
    environment:
      - SECRET=${TELEPROXY_SECRET}
      - PORT=8443
      - DIRECT_MODE=true
      - SOCKS5_PROXY=socks5://socks5:1080
      - WORKERS=1
    depends_on:
      socks5:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8888/stats || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s

  tester:
    build: .
    environment:
      - TELEPROXY_HOST=teleproxy
      - TELEPROXY_PORT=8443
      - TELEPROXY_STATS_PORT=8888
      - TEST_SOCKS5=true
    command: ["python3", "test_socks5.py"]
    depends_on:
      teleproxy:
        condition: service_healthy
