services:
  teleproxy:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      - SECRET=${TELEPROXY_SECRET}
      - PORT=8443
      - STATS_PORT=8888
      - EXTERNAL_IP=198.51.100.1
      - WORKERS=1
      - DIRECT_MODE=true
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8888/stats || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s

  tester:
    build: .
    environment:
      - TELEPROXY_HOST=teleproxy
      - TELEPROXY_STATS_PORT=8888
      - EXPECTED_IP=198.51.100.1
    depends_on:
      teleproxy:
        condition: service_healthy
    command: ["python", "test_link_ip.py"]
